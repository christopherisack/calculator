<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Precision Calculator | Modern Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="display">
        <div class="previous-operand" id="previousOperand"></div>
        <div class="current-operand" id="currentOperand">0</div>
    </div>
    <div class="buttons">
        <!-- Row 1: Clear, Delete, Percent, Divide -->
        <button class="function-btn" data-action="clear">AC</button>
        <button class="function-btn" data-action="delete">DEL</button>
        <button class="function-btn" data-action="percent">%</button>
        <button class="operator-btn" data-operator="/">÷</button>

        <!-- Row 2: 7,8,9, Multiply -->
        <button data-number="7">7</button>
        <button data-number="8">8</button>
        <button data-number="9">9</button>
        <button class="operator-btn" data-operator="*">×</button>

        <!-- Row 3: 4,5,6, Subtract -->
        <button data-number="4">4</button>
        <button data-number="5">5</button>
        <button data-number="6">6</button>
        <button class="operator-btn" data-operator="-">-</button>

        <!-- Row 4: 1,2,3, Addition -->
        <button data-number="1">1</button>
        <button data-number="2">2</button>
        <button data-number="3">3</button>
        <button class="operator-btn" data-operator="+">+</button>

        <!-- Row 5: 0, ., Equals -->
        <button class="span-two" data-number="0">0</button>
        <button data-number=".">.</button>
        <button class="operator-btn equals-btn" data-action="equals">=</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
